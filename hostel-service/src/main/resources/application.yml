server:
  port: 8085

spring:
  application:
    name: hostel-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_campus
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
    root: INFO
    com.saas.smartcampus: DEBUG
    org.hibernate.SQL: DEBUG
